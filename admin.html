<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم - Gedo Shoping</title>
    <link rel="stylesheet" href="admin-style.css">
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loginSection" class="admin-card">
        <h2>🔐 تسجيل دخول الإدارة</h2>
        <input type="email" id="adminEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="adminPassword" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول</button>
        <p id="loginError" style="color: red; display: none;">بيانات الدخول غير صحيحة!</p>
    </div>

    <div id="adminPanel" style="display: none; width: 100%; max-width: 600px; margin: 0 auto; padding: 20px;">

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="tabProducts" onclick="switchTab('products')" style="flex:1; background:#c6a664; color:white; border:none; padding:12px; border-radius:8px; font-size:15px; cursor:pointer; font-family:Cairo,sans-serif; font-weight:700;">🛒 المنتجات</button>
            <button id="tabOffers" onclick="switchTab('offers')" style="flex:1; background:#ff5722; color:white; border:none; padding:12px; border-radius:8px; font-size:15px; cursor:pointer; font-family:Cairo,sans-serif; font-weight:700;">🔥 العروض</button>
        </div>

        <div id="productsTab" class="admin-card">
            <h2>🛒 إضافة منتج جديد</h2>
            <div class="form-group">
                <label>البيانات الأساسية:</label>
                <input type="text" id="pName" placeholder="اسم المنتج بالعربي (إجباري)">
                <input type="number" id="pPrice" placeholder="السعر (إجباري)">
                <select id="pCategory">
                    <option value="spices">بهارات</option>
                    <option value="herbs">أعشاب</option>
                    <option value="coffee">بن</option>
                    <option value="oils">زيوت</option>
                    <option value="incense">بخور</option>
                    <option value="cosmetics">تجميل</option>
                    <option value="medical">وصفات طبية علاجية</option>
                    <option value="honey">عسل</option>
                </select>

                <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px dashed #ccc; margin: 10px 0; text-align: right;">
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">🖼️ صورة المنتج</label>
                    <input type="text" id="pImageUrl" placeholder="ضع رابط الصورة هنا مباشرة...">
                    <button type="button" class="cloudinary-button-trigger" style="background: #2196F3; margin-top: 5px; font-size: 13px;">🖼️ ارفع صورة من الموبايل</button>
                </div>

                <label style="margin-top:10px;">أو إيموجي بديل (اختياري):</label>
                <input type="text" id="pEmoji" placeholder="مثال: 🍯">
                <label style="margin-top:10px;">بيانات إضافية:</label>
                <input type="text" id="pNameEn" placeholder="اسم المنتج بالإنجليزي (اختياري)">
                <textarea id="pDesc" placeholder="وصف المنتج (اختياري)"></textarea>
            </div>
            <button id="submitBtn" onclick="addProduct()">✨ حفظ ونشر المنتج</button>
            <button onclick="logout()" style="background: #666; margin-top: 10px;">تسجيل خروج</button>
            <hr>
            <h3>📦 المنتجات الحالية</h3>
            <div id="adminProductsList"></div>
        </div>

        <div id="offersTab" class="admin-card" style="display:none;">
            <h2>🔥 إضافة عرض جديد</h2>
            <div class="form-group">
                <label>البيانات الأساسية:</label>
                <input type="text" id="oName" placeholder="اسم المنتج / العرض (إجباري)">
                <input type="number" id="oOriginalPrice" placeholder="السعر الأصلي قبل الخصم (إجباري)">
                <input type="number" id="oSalePrice" placeholder="سعر العرض بعد الخصم (إجباري)">
                
                <div style="background: #fff5f2; padding: 15px; border-radius: 8px; border: 1px dashed #ff5722; margin: 10px 0; text-align: right;">
                    <label style="font-weight: bold; display: block; margin-bottom: 8px;">🖼️ صورة العرض</label>
                    <input type="text" id="oImageUrl" placeholder="ضع رابط صورة العرض هنا...">
                    <button type="button" class="cloudinary-button-trigger" style="background: #ff5722; margin-top: 5px; font-size: 13px;">🖼️ ارفع عرض جديد</button>
                </div>

                <label style="margin-top:10px;">أو إيموجي بديل (اختياري):</label>
                <input type="text" id="oEmoji" placeholder="مثال: 🏷️">
                <textarea id="oDesc" placeholder="وصف العرض (اختياري)"></textarea>
            </div>
            <button onclick="addOffer()" style="background: linear-gradient(135deg, #ff4500, #ff7c00);">🔥 نشر العرض</button>
            <button onclick="logout()" style="background: #666; margin-top: 10px;">تسجيل خروج</button>
            <hr>
            <h3>🏷️ العروض الحالية</h3>
            <div id="adminOffersList"></div>
        </div>

        <p align="center"><a href="index.html">Back to Home</a></p>
    </div>
    

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
