<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gedo Shoping - Premium herbal products, spices, oils, and natural cosmetics">
    <title>Gedo Shoping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="light-mode">
    <nav class="navbar">
        <div class="nav-container container">
            <div class="nav-brand">
                <div class="logo-wrapper">
                    <img src="images/logo.png" alt="Gedo Logo" class="brand-logo">
                </div>
                <div class="brand-text-wrapper">
                    <span class="brand-name">Gedo</span>
                    <span class="brand-subtitle">Shoping</span>
                </div>
            </div>
            
            <div class="nav-controls">
                <button class="control-btn theme-toggle" id="themeToggle" title="تبديل الوضع">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
                <button class="control-btn cart-icon" id="cartIcon" title="سلة التسوق">
                    <span class="icon-cart">🛒</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container hero-wrapper">
            <div class="hero-content">
                <div class="hero-header">
                    <div class="hero-logo-wrapper">
                        <img src="images/logo.png" alt="Gedo Logo" class="hero-logo">
                    </div>
                    <h1 class="hero-title">أجود المنتجات الطبيعية</h1>
                </div>
                <p class="hero-subtitle">Premium Natural Products</p>
                <p class="hero-description">أفضل أنواع البهارات والأعشاب والزيوت ومستحضرات العناية الطبيعية</p>
                <button class="shop-now-btn">تسوق الآن</button>
            </div>
        </div>
    </section>

    <section class="categories-section">
        <div class="container categories-wrapper">
            <div class="categories-scroll-container">
                <button class="category-btn active" data-category="all">
                    <span class="ar">الكل</span>
                    <span class="en">All</span>
                </button>
                <button class="category-btn" data-category="spices">
                    <span class="ar">بهارات</span>
                    <span class="en">Spices</span>
                </button>
                <button class="category-btn" data-category="herbs">
                    <span class="ar">أعشاب</span>
                    <span class="en">Herbs</span>
                </button>
                <button class="category-btn" data-category="coffee">
                    <span class="ar">بن</span>
                    <span class="en">Coffee</span>
                </button>
                <button class="category-btn" data-category="oils">
                    <span class="ar">زيوت</span>
                    <span class="en">Oils</span>
                </button>
                <button class="category-btn" data-category="incense">
                    <span class="ar">بخور</span>
                    <span class="en">Incense</span>
                </button>
                <button class="category-btn" data-category="cosmetics">
                    <span class="ar">تجميل</span>
                    <span class="en">Cosmetics</span>
                </button>
            </div>
        </div>
    </section>

    <section class="products-section">
        <div class="container">
            <div class="products-grid" id="productsGrid">
                <!-- Products will be loaded here -->
            </div>
            <div class="empty-state" id="emptyState" style="display: none;">
                <p>لا توجد منتجات في هذا القسم حالياً.</p>
            </div>
        </div>
    </section>

    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2 class="cart-title">سلة التسوق</h2>
            <button class="cart-close" id="cartClose">✕</button>
        </div>
        <div class="cart-items-container" id="cartItems">
            <p class="empty-message">سلتك فارغة</p>
        </div>
        <div class="cart-footer">
            <div class="cart-summary">
                <div class="summary-row">
                    <span>عدد المنتجات:</span>
                    <span id="cartCount">0</span>
                </div>
                <div class="summary-row total">
                    <span>الإجمالي:</span>
                    <span id="cartTotal">EGP 0.00</span>
                </div>
            </div>
            <button class="order-btn" id="orderBtn">
                <span class="whatsapp-icon">📞</span>
                اطلب عبر واتس أب
            </button>
        </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <footer class="footer">
        <div class="container footer-content">
            <p>&copy; 2026 Gedo Shoping | جميع الحقوق محفوظة</p>
            <p class="footer-contact">
                <span class="whatsapp-icon">📱</span>
                01002402986
            </p>
        </div>
    </footer>

    <!-- Firebase SDK v9 (Modular) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Your config and app files -->
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>

</body>
</html>
